<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} — textbin</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="view-layout">
        <header class="view-header">
            <a href="/" class="logo">textbin</a>
            <div class="view-actions">
                <button class="btn btn-small" onclick="copyLink()">Copy Link</button>
                <a href="/" class="btn btn-small">New</a>
            </div>
        </header>
        <article class="view-content">
            <h1 class="view-title">{{.Title}}</h1>
            <time class="view-time">{{.CreatedAt.Format "Jan 2, 2006 at 3:04 PM"}}</time>
            <pre class="view-body">{{.Body}}</pre>
        </article>
    </div>
    <script>
    function copyLink() {
        navigator.clipboard.writeText(window.location.href).then(() => {
            const btn = document.querySelector('.view-actions .btn');
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = 'Copy Link', 2000);
        });
    }
    </script>
</body>
</html>
